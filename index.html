<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Stranger Things: The 16-Bit Rift</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="vhs-overlay"></div> <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>
        
        <div id="dialogue-container" class="hidden">
            <div id="portrait"></div>
            <div id="text-box">
                <h3 id="speaker-name">Eleven</h3>
                <p id="message"></p>
                <span class="blink-arrow">▼</span>
            </div>
        </div>

        <div id="shop-screen" class="hidden">
            <div class="shop-header">--- BAZAAR DE HAWKINS ---</div>
            <div id="inventory-info">Énergie : <span id="coin-count">0</span></div>
            <div class="shop-grid">
                <div class="item" onclick="buy('speed')">📦 Gaufre (Vitesse) - 10</div>
                <div class="item" onclick="buy('jump')">👟 Baskets (Saut) - 20</div>
                <div class="item" onclick="buy('power')">🔋 Lampe (Puissance) - 30</div>
            </div>
            <button onclick="closeShop()">RETOUR AU MONDE À L'ENVERS</button>
        </div>
    </div>

    <audio id="bgMusic" loop src="assets/synthwave_loop.mp3"></audio>
    <audio id="sfxCoin" src="assets/coin.mp3"></audio>

    <script src="game.js"></script>
</body>
</html>
