<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Leap | Mario Competitor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="ui-container">
        <div id="header">
            <div id="score-box" class="glass">
                <img src="assets/coin.png" alt="Score" class="ui-icon">
                <span id="score">0</span>
            </div>
            <div id="timer-box" class="glass">
                TEMPS: <span id="timer">00:00</span>
            </div>
        </div>

        <div id="menu" class="glass">
            <h1>AETHER LEAP</h1>
            <p>Le nouveau standard de la plateforme.</p>
            <button id="start-btn" class="premium-btn">DÉMARRER</button>
            <div class="controls-hint">
                <span>[←] [→] Bouger</span>
                <span>[ESPACE] Sauter</span>
            </div>
        </div>

        <div id="game-over" class="glass hidden">
            <h2>FIN DE PARTIE</h2>
            <p>Score Final: <span id="final-score">0</span></p>
            <button id="restart-btn" class="premium-btn">RÉESSAYER</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="game.js" type="module"></script>
</body>
</html>
